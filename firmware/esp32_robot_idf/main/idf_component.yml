## Managed component dependencies (esp-idf-component-manager).
##
## Pinned at SHAs / tags that build cleanly together. When updating, build
## both the ESP32-S3 and ESP32-CAM-MB targets before committing — libpeer's
## SCTP usage in particular has been sensitive to mbedTLS version changes.

dependencies:
  # WebRTC peer — vendored in components/esp_peer/ (forked from
  # espressif/esp_peer 1.4.1) so we can patch dtls_srtp.c to use ECDSA
  # P-256 instead of stock RSA-1024. Chrome 124+ rejects RSA WebRTC
  # certs; ECDSA is what WebRTC standardized on. Local component takes
  # precedence over managed; keep this dep removed to avoid name conflict.

  # Camera driver. Espressif official component.
  espressif/esp32-camera: "^2.0.15"

  idf:
    version: ">=5.1.0"
