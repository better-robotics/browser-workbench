<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Subtle vertical gradient — Apple icons rarely use a flat fill. -->
    <linearGradient id="bgLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eceef1"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23262a"/>
      <stop offset="1" stop-color="#14171a"/>
    </linearGradient>
    <!-- iOS continuous-corner squircle (n≈5 superellipse approximation
         via asymmetric cubic beziers). At favicon sizes the difference
         vs a regular rounded rect is invisible; at PWA install sizes
         the squircle reads as Apple-native. -->
    <clipPath id="iconShape">
      <path d="M 92.16000000000001 0 L 163.83999999999997 0 C 221.44 0 256 34.56 256 92.16000000000001 L 256 163.83999999999997 C 256 221.44 221.44 256 163.83999999999997 256 L 92.16000000000001 256 C 34.56 256 0 221.44 0 163.83999999999997 L 0 92.16000000000001 C 0 34.56 34.56 0 92.16000000000001 0 Z"/>
    </clipPath>
  </defs>
  <style>
    .bg { fill: url(#bgLight); }
    .b  { fill: #012169; }
    .r  { fill: #6e6e73; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bgDark); }
      .b  { fill: #0577B1; }
      .r  { fill: #adb5bd; }
    }
  </style>
